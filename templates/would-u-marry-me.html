<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,500&family=Dancing+Script:wght@600;700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  :root{
    --twilight: #2b1622;
    --twilight-deep: #1c0e17;
    --blush: #f4d9de;
    --blush-soft: #fbeef1;
    --rose: #d98a97;
    --gold: #c9a15a;
    --mauve: #9c7488;
    --ember: #e8b4a0;
  }

  *{ box-sizing:border-box; }

  .proposal-root{
    position:relative;
    min-height:640px;
    width:100%;
    overflow:hidden;
    background:
      radial-gradient(ellipse 80% 60% at 50% 15%, rgba(201,161,90,0.14), transparent 60%),
      linear-gradient(180deg, var(--twilight) 0%, var(--twilight-deep) 100%);
    font-family:'Jost', sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px 20px;
  }

  .stars{
    position:absolute; inset:0;
    background-image:
      radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1px 1px at 80% 30%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1px 1px at 30% 70%, rgba(255,255,255,0.35), transparent),
      radial-gradient(1px 1px at 65% 80%, rgba(255,255,255,0.45), transparent),
      radial-gradient(1px 1px at 90% 60%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1px 1px at 45% 10%, rgba(255,255,255,0.4), transparent);
    background-size: 100% 100%;
    opacity:0.8;
    pointer-events:none;
  }

  .ember-field{
    position:absolute; inset:0;
    pointer-events:none;
    overflow:hidden;
  }
  .ember{
    position:absolute;
    bottom:-20px;
    font-size:14px;
    color:var(--ember);
    opacity:0;
    animation: rise linear infinite;
    filter: drop-shadow(0 0 4px rgba(232,180,160,0.6));
  }
  @keyframes rise{
    0%{ transform:translateY(0) translateX(0) rotate(0deg); opacity:0; }
    10%{ opacity:0.9; }
    90%{ opacity:0.5; }
    100%{ transform:translateY(-620px) translateX(var(--drift,20px)) rotate(180deg); opacity:0; }
  }

  .card{
    position:relative;
    z-index:2;
    max-width:480px;
    width:100%;
    text-align:center;
    padding:56px 40px 44px;
    background: linear-gradient(180deg, rgba(251,238,241,0.06), rgba(251,238,241,0.02));
    border:1px solid rgba(201,161,90,0.35);
    border-radius:2px;
    backdrop-filter: blur(2px);
  }

  .card::before, .card::after{
    content:'';
    position:absolute;
    width:34px; height:34px;
    border:1px solid var(--gold);
    opacity:0.6;
  }
  .card::before{ top:-1px; left:-1px; border-right:none; border-bottom:none; }
  .card::after{ bottom:-1px; right:-1px; border-left:none; border-top:none; }

  .eyebrow{
    font-size:12px;
    letter-spacing:0.35em;
    text-transform:uppercase;
    color:var(--gold);
    margin-bottom:22px;
    opacity:0.85;
  }

  .name{
    font-family:'Dancing Script', cursive;
    font-weight:700;
    font-size:clamp(48px, 9vw, 68px);
    color:var(--blush);
    line-height:1;
    margin:0 0 6px;
    text-shadow: 0 0 30px rgba(232,180,160,0.25);
  }

  .question{
    font-family:'Cormorant Garamond', serif;
    font-weight:600;
    font-size:clamp(28px, 5vw, 38px);
    color:var(--blush-soft);
    margin:0 0 18px;
    letter-spacing:0.01em;
  }

  .subtext{
    font-size:15px;
    color:var(--mauve);
    line-height:1.7;
    max-width:340px;
    margin:0 auto 38px;
  }

  .button-stage{
    position:relative;
    height:140px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:18px;
  }

  .btn{
    font-family:'Jost', sans-serif;
    font-size:15px;
    letter-spacing:0.04em;
    padding:14px 30px;
    border-radius:999px;
    cursor:pointer;
    border:none;
    transition: transform 0.25s cubic-bezier(.2,.9,.3,1.3), box-shadow 0.25s ease;
  }

  .btn-yes{
    background: linear-gradient(135deg, var(--gold), #e0c07f);
    color:var(--twilight-deep);
    font-weight:500;
    box-shadow: 0 8px 24px rgba(201,161,90,0.35);
    transform: scale(var(--yes-scale, 1));
  }
  .btn-yes:hover{ transform: scale(calc(var(--yes-scale, 1) * 1.06)); }

  .btn-no{
    position:relative;
    background:transparent;
    color:var(--mauve);
    border:1px solid rgba(156,116,136,0.6);
    font-weight:300;
  }
  .btn-no.dodging{
    position:absolute;
  }

  .hint{
    margin-top:22px;
    font-size:13px;
    color:var(--rose);
    opacity:0;
    transition:opacity 0.3s ease;
    min-height:18px;
    font-style:italic;
  }
  .hint.show{ opacity:0.85; }

  /* celebration state */
  .celebration{
    display:none;
    flex-direction:column;
    align-items:center;
    text-align:center;
  }
  .celebration.show{ display:flex; }
  .card.celebrating .pre-yes{ display:none; }

  .ring{
    font-size:44px;
    margin-bottom:8px;
    animation: pop 0.6s cubic-bezier(.2,.9,.3,1.4);
  }
  @keyframes pop{
    0%{ transform:scale(0) rotate(-20deg); opacity:0; }
    60%{ transform:scale(1.15) rotate(6deg); opacity:1; }
    100%{ transform:scale(1) rotate(0); }
  }

  .celebration .big{
    font-family:'Dancing Script', cursive;
    font-size:clamp(36px, 7vw, 50px);
    color:var(--blush);
    margin:0 0 10px;
  }
  .celebration .small{
    font-size:15px;
    color:var(--mauve);
    max-width:320px;
    line-height:1.7;
  }

  .confetti-piece{
    position:absolute;
    top:-10px;
    font-size:16px;
    animation: fall linear forwards;
    pointer-events:none;
    z-index:5;
  }
  @keyframes fall{
    to{ transform: translateY(680px) rotate(360deg); opacity:0.2; }
  }

  @media (prefers-reduced-motion: reduce){
    .ember, .confetti-piece{ animation: none; display:none; }
    .btn{ transition:none; }
  }
</style>

<div class="proposal-root" id="proposalRoot">
  <div class="stars"></div>
  <div class="ember-field" id="emberField"></div>

  <div class="card" id="card">
    <div class="pre-yes">
      <div class="eyebrow">A question, for Faiqa</div>
      <p class="name">Faiqa,</p>
      <h1 class="question">will you marry me?</h1>
      <p class="subtext">Of every ordinary day I've imagined, you're the only person I want beside me in all of them. So — before anything else —</p>

      <div class="button-stage" id="buttonStage">
        <button class="btn btn-yes" id="yesBtn" style="--yes-scale:1">Yes, I will</button>
        <button class="btn btn-no" id="noBtn">No</button>
      </div>
      <div class="hint" id="hint"></div>
    </div>

    <div class="celebration" id="celebration">
      <div class="ring">💍</div>
      <p class="big">She said yes.</p>
      <p class="small">Faiqa, thank you for choosing forever with me. This is only the first of many good yeses to come.</p>
    </div>
  </div>
</div>

<script>
(function(){
  const root = document.getElementById('proposalRoot');
  const stage = document.getElementById('buttonStage');
  const noBtn = document.getElementById('noBtn');
  const yesBtn = document.getElementById('yesBtn');
  const hint = document.getElementById('hint');
  const card = document.getElementById('card');
  const celebration = document.getElementById('celebration');
  const emberField = document.getElementById('emberField');

  const hints = [
    "Hm, wrong button.",
    "It's a little shy.",
    "Try again?",
    "Nope, still not that one.",
    "It really doesn't want to be pressed.",
    "Okay, it's just showing off now.",
    "There's only one right answer here."
  ];
  let dodgeCount = 0;

  function dodge(){
    dodgeCount++;
    const stageRect = stage.getBoundingClientRect();
    const rootRect = root.getBoundingClientRect();
    const btnW = noBtn.offsetWidth;
    const btnH = noBtn.offsetHeight;

    // switch to absolute positioning within the stage on first dodge
    if(!noBtn.classList.contains('dodging')){
      noBtn.classList.add('dodging');
      stage.style.position = 'relative';
    }

    const maxX = Math.max(stageRect.width - btnW, 0);
    const maxY = Math.max(stageRect.height - btnH, 0);
    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    noBtn.style.left = x + 'px';
    noBtn.style.top = y + 'px';

    const scale = Math.min(1 + dodgeCount * 0.045, 1.6);
    yesBtn.style.setProperty('--yes-scale', scale);

    hint.textContent = hints[Math.min(dodgeCount - 1, hints.length - 1)];
    hint.classList.add('show');
  }

  noBtn.addEventListener('mouseenter', dodge);
  noBtn.addEventListener('touchstart', function(e){ e.preventDefault(); dodge(); }, {passive:false});
  noBtn.addEventListener('click', function(e){ e.preventDefault(); dodge(); });

  function spawnEmbers(){
    for(let i=0;i<14;i++){
      const e = document.createElement('div');
      e.className = 'ember';
      e.textContent = ['♥','✦','♥'][i % 3];
      e.style.left = Math.random() * 100 + '%';
      e.style.setProperty('--drift', (Math.random() * 60 - 30) + 'px');
      e.style.animationDuration = (7 + Math.random() * 6) + 's';
      e.style.animationDelay = (Math.random() * 8) + 's';
      e.style.fontSize = (10 + Math.random() * 10) + 'px';
      emberField.appendChild(e);
    }
  }
  spawnEmbers();

  function spawnConfetti(){
    const pieces = ['💛','💍','✦','🤍','♥'];
    for(let i=0;i<40;i++){
      const c = document.createElement('div');
      c.className = 'confetti-piece';
      c.textContent = pieces[Math.floor(Math.random()*pieces.length)];
      c.style.left = Math.random() * 100 + '%';
      c.style.animationDuration = (2.2 + Math.random() * 2) + 's';
      c.style.animationDelay = (Math.random() * 0.6) + 's';
      c.style.fontSize = (14 + Math.random() * 12) + 'px';
      root.appendChild(c);
      setTimeout(() => c.remove(), 5200);
    }
  }

  yesBtn.addEventListener('click', function(){
    card.classList.add('celebrating');
    celebration.classList.add('show');
    spawnConfetti();
    setTimeout(spawnConfetti, 700);
  });
})();
</script>
