<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>hey Faiqa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,500&family=Dancing+Script:wght@600;700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --twilight:#2b1622; --twilight-deep:#1c0e17;
    --blush:#f4d9de; --blush-soft:#fbeef1;
    --rose:#d98a97; --gold:#c9a15a; --mauve:#9c7488; --ember:#e8b4a0;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; }
  body{
    min-height:100vh; width:100%; overflow:hidden;
    background:
      radial-gradient(ellipse 80% 60% at 50% 15%, rgba(201,161,90,0.14), transparent 60%),
      linear-gradient(180deg, var(--twilight) 0%, var(--twilight-deep) 100%);
    font-family:'Jost', sans-serif;
    display:flex; align-items:center; justify-content:center;
    padding:40px 20px; position:relative;
  }
  .stars{ position:absolute; inset:0;
    background-image:
      radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1px 1px at 80% 30%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1px 1px at 30% 70%, rgba(255,255,255,0.35), transparent),
      radial-gradient(1px 1px at 65% 80%, rgba(255,255,255,0.45), transparent),
      radial-gradient(1px 1px at 90% 60%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1px 1px at 45% 10%, rgba(255,255,255,0.4), transparent);
    opacity:0.8; pointer-events:none;
  }
  .ember-field{ position:absolute; inset:0; pointer-events:none; overflow:hidden; }
  .ember{ position:absolute; bottom:-20px; color:var(--ember); opacity:0;
    animation: rise linear infinite; filter: drop-shadow(0 0 4px rgba(232,180,160,0.6)); }
  @keyframes rise{
    0%{ transform:translateY(0) translateX(0) rotate(0deg); opacity:0; }
    10%{ opacity:0.9; } 90%{ opacity:0.5; }
    100%{ transform:translateY(-620px) translateX(var(--drift,20px)) rotate(180deg); opacity:0; }
  }
  .card{
    position:relative; z-index:2; max-width:440px; width:100%; text-align:center;
    padding:44px 36px 40px;
    background: linear-gradient(180deg, rgba(251,238,241,0.06), rgba(251,238,241,0.02));
    border:1px solid rgba(201,161,90,0.35); border-radius:2px;
  }
  .card::before, .card::after{ content:''; position:absolute; width:34px; height:34px; border:1px solid var(--gold); opacity:0.6; }
  .card::before{ top:-1px; left:-1px; border-right:none; border-bottom:none; }
  .card::after{ bottom:-1px; right:-1px; border-left:none; border-top:none; }

  .bear{ width:150px; height:150px; margin:0 auto 18px; animation: floatBear 4s ease-in-out infinite; }
  @keyframes floatBear{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-8px); } }

  .greet{
    font-family:'Dancing Script', cursive; font-weight:700;
    font-size:clamp(38px, 8vw, 50px); color:var(--blush);
    margin:0 0 6px; text-shadow: 0 0 30px rgba(232,180,160,0.25);
    opacity:0; animation: fadeUp 0.8s 0.2s cubic-bezier(.19,1,.22,1) forwards;
  }
  .sub{
    font-family:'Cormorant Garamond', serif; font-weight:500; font-style:italic;
    font-size:clamp(20px, 4vw, 26px); color:var(--blush-soft); margin:0 0 34px;
    opacity:0; animation: fadeUp 0.8s 0.6s cubic-bezier(.19,1,.22,1) forwards;
  }
  @keyframes fadeUp{ from{ opacity:0; transform:translateY(24px); } to{ opacity:1; transform:translateY(0); } }

  .btn{
    font-family:'Jost', sans-serif; font-size:15px; letter-spacing:0.04em;
    padding:14px 34px; border-radius:999px; cursor:pointer; border:none;
    text-decoration:none; display:inline-block;
    background: linear-gradient(135deg, var(--gold), #e0c07f); color:var(--twilight-deep); font-weight:500;
    box-shadow: 0 8px 24px rgba(201,161,90,0.35);
    transition: transform 0.25s cubic-bezier(.2,.9,.3,1.3);
    opacity:0; animation: fadeUp 0.8s 1.1s cubic-bezier(.19,1,.22,1) forwards;
  }
  .btn:hover{ transform: scale(1.06); }
</style>
</head>
<body>
  <div class="stars"></div>
  <div class="ember-field" id="emberField"></div>

  <div class="card">
    <svg class="bear" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="95" cy="55" rx="17" ry="17" fill="#f8f2ec"/>
      <ellipse cx="145" cy="55" rx="17" ry="17" fill="#f8f2ec"/>
      <ellipse cx="95" cy="57" rx="8" ry="8" fill="#d9b48a"/>
      <ellipse cx="145" cy="57" rx="8" ry="8" fill="#d9b48a"/>
      <ellipse cx="120" cy="150" rx="20" ry="18" fill="#f8f2ec"/>
      <ellipse cx="145" cy="205" rx="20" ry="18" fill="#f8f2ec"/>
      <ellipse cx="95" cy="205" rx="20" ry="18" fill="#f8f2ec"/>
      <ellipse cx="120" cy="163" rx="56" ry="48" fill="#f8f2ec"/>
      <ellipse cx="120" cy="175" rx="26" ry="20" fill="#efe4d8"/>
      <ellipse cx="93" cy="150" rx="15" ry="15" fill="#f8f2ec"/>
      <ellipse cx="147" cy="150" rx="15" ry="15" fill="#f8f2ec"/>
      <circle cx="120" cy="90" r="46" fill="#f8f2ec"/>
      <ellipse cx="120" cy="100" rx="21" ry="15" fill="#f2e3ce"/>
      <circle cx="104" cy="84" r="5" fill="#211018"/>
      <circle cx="136" cy="84" r="5" fill="#211018"/>
      <ellipse cx="120" cy="97" rx="5" ry="4" fill="#211018"/>
      <path d="M 112 106 Q 120 112 128 106" stroke="#211018" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M 120 128 C 100 100, 60 112, 60 140 C 60 168, 96 186, 120 212 C 144 186, 180 168, 180 140 C 180 112, 140 100, 120 128 Z" fill="#e8798f"/>
    </svg>

    <p class="greet">hey Faiqa,</p>
    <p class="sub">I have something for you</p>

    <a class="btn" href="something-funny.html">Let's begin</a>
  </div>

<script>
  const field = document.getElementById('emberField');
  for(let i=0;i<14;i++){
    const e = document.createElement('div');
    e.className = 'ember';
    e.textContent = ['♥','✦','♥'][i % 3];
    e.style.left = Math.random() * 100 + '%';
    e.style.setProperty('--drift', (Math.random() * 60 - 30) + 'px');
    e.style.animationDuration = (7 + Math.random() * 6) + 's';
    e.style.animationDelay = (Math.random() * 8) + 's';
    e.style.fontSize = (10 + Math.random() * 10) + 'px';
    field.appendChild(e);
  }
</script>
</body>
</html>
