<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>from the moment</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,500&family=Dancing+Script:wght@600;700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --twilight:#2b1622; --twilight-deep:#1c0e17;
    --blush:#f4d9de; --blush-soft:#fbeef1;
    --rose:#d98a97; --gold:#c9a15a; --mauve:#9c7488; --ember:#e8b4a0;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; }
  body{
    min-height:100vh; width:100%; overflow:hidden;
    background:
      radial-gradient(ellipse 80% 60% at 50% 15%, rgba(201,161,90,0.14), transparent 60%),
      linear-gradient(180deg, var(--twilight) 0%, var(--twilight-deep) 100%);
    font-family:'Jost', sans-serif;
    display:flex; align-items:center; justify-content:center;
    padding:40px 20px; position:relative;
  }
  .stars{ position:absolute; inset:0;
    background-image:
      radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1px 1px at 80% 30%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1px 1px at 30% 70%, rgba(255,255,255,0.35), transparent),
      radial-gradient(1px 1px at 65% 80%, rgba(255,255,255,0.45), transparent),
      radial-gradient(1px 1px at 90% 60%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1px 1px at 45% 10%, rgba(255,255,255,0.4), transparent);
    opacity:0.8; pointer-events:none;
  }
  .ember-field{ position:absolute; inset:0; pointer-events:none; overflow:hidden; }
  .ember{ position:absolute; bottom:-20px; color:var(--ember); opacity:0;
    animation: rise linear infinite; filter: drop-shadow(0 0 4px rgba(232,180,160,0.6)); }
  @keyframes rise{
    0%{ transform:translateY(0) translateX(0) rotate(0deg); opacity:0; }
    10%{ opacity:0.9; } 90%{ opacity:0.5; }
    100%{ transform:translateY(-620px) translateX(var(--drift,20px)) rotate(180deg); opacity:0; }
  }
  .card{
    position:relative; z-index:2; max-width:480px; width:100%; text-align:center;
    padding:44px 36px 40px;
    background: linear-gradient(180deg, rgba(251,238,241,0.06), rgba(251,238,241,0.02));
    border:1px solid rgba(201,161,90,0.35); border-radius:2px;
  }
  .card::before, .card::after{ content:''; position:absolute; width:34px; height:34px; border:1px solid var(--gold); opacity:0.6; }
  .card::before{ top:-1px; left:-1px; border-right:none; border-bottom:none; }
  .card::after{ bottom:-1px; right:-1px; border-left:none; border-top:none; }

  .hearts-row{ display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:20px; }
  .heart-left{ width:96px; height:96px; animation: floatL 3s ease-in-out infinite; }
  .heart-right{ width:110px; height:110px; animation: floatR 3s ease-in-out infinite 0.3s; }
  @keyframes floatL{ 0%,100%{ transform:translateY(0) rotate(-4deg); } 50%{ transform:translateY(-6px) rotate(-4deg); } }
  @keyframes floatR{ 0%,100%{ transform:translateY(0) rotate(3deg); } 50%{ transform:translateY(-8px) rotate(3deg); } }

  .lines{ min-height:150px; display:flex; flex-direction:column; justify-content:center; gap:12px; margin-bottom:8px; }
  .slide-line{
    font-family:'Cormorant Garamond', serif; font-weight:500;
    font-size:clamp(19px, 4.2vw, 24px); color:var(--blush-soft); line-height:1.4;
    opacity:0; transform:translateY(40px);
    animation: slideUp 0.75s cubic-bezier(.19,1,.22,1) forwards;
  }
  @keyframes slideUp{ to{ opacity:1; transform:translateY(0); } }

  .cta-wrap{ margin-top:28px; }
  .btn{
    font-family:'Jost', sans-serif; font-size:15px; letter-spacing:0.04em;
    padding:14px 34px; border-radius:999px; cursor:pointer; border:none;
    text-decoration:none; display:inline-block;
    background: linear-gradient(135deg, var(--gold), #e0c07f); color:var(--twilight-deep); font-weight:500;
    box-shadow: 0 8px 24px rgba(201,161,90,0.35);
    opacity:0; transform:translateY(30px); pointer-events:none;
    transition: opacity 0.6s ease, transform 0.6s cubic-bezier(.19,1,.22,1);
  }
  .btn.visible{ opacity:1; transform:translateY(0); pointer-events:auto; }
  .btn:hover{ transform: scale(1.06); }
</style>
</head>
<body>
  <div class="stars"></div>
  <div class="ember-field" id="emberField"></div>

  <div class="card">
    <div class="hearts-row">
      <svg class="heart-left" viewBox="0 0 200 190" xmlns="http://www.w3.org/2000/svg">
        <path d="M 100 40 C 78 5, 20 15, 20 62 C 20 108, 68 135, 100 170 C 132 135, 180 108, 180 62 C 180 15, 122 5, 100 40 Z" fill="#d98a97"/>
        <ellipse cx="86" cy="72" rx="10" ry="12" fill="#fdf3f4"/>
        <ellipse cx="130" cy="72" rx="10" ry="12" fill="#fdf3f4"/>
        <circle cx="90" cy="70" r="5" fill="#221019"/>
        <circle cx="134" cy="70" r="5" fill="#221019"/>
        <circle cx="70" cy="90" r="8" fill="#f6c7cf" opacity="0.6"/>
        <path d="M 96 98 Q 106 104 114 99" stroke="#221019" stroke-width="3" fill="none" stroke-linecap="round"/>
      </svg>
      <svg class="heart-right" viewBox="0 0 200 190" xmlns="http://www.w3.org/2000/svg">
        <path d="M 100 40 C 78 5, 20 15, 20 62 C 20 108, 68 135, 100 170 C 132 135, 180 108, 180 62 C 180 15, 122 5, 100 40 Z" fill="#ee7f97"/>
        <ellipse cx="78" cy="72" rx="10" ry="12" fill="#221019"/>
        <ellipse cx="122" cy="72" rx="10" ry="12" fill="#221019"/>
        <circle cx="81" cy="68" r="3" fill="#ffffff"/>
        <circle cx="125" cy="68" r="3" fill="#ffffff"/>
        <circle cx="62" cy="90" r="9" fill="#f6a8b8" opacity="0.7"/>
        <circle cx="138" cy="90" r="9" fill="#f6a8b8" opacity="0.7"/>
        <path d="M 90 96 Q 100 103 110 96" stroke="#221019" stroke-width="3" fill="none" stroke-linecap="round"/>
      </svg>
    </div>

    <div class="lines" id="lines">
      <p class="slide-line" style="animation-delay:0.1s">From the moment I saw you, I knew you were different.</p>
      <p class="slide-line" style="animation-delay:1.0s">I knew I would fall for you.</p>
      <p class="slide-line" style="animation-delay:1.9s">And I knew we would become an important part of each other's life.</p>
    </div>

    <div class="cta-wrap">
      <a class="btn" id="ctaBtn" href="faiqa-marry-me.html">Keep going</a>
    </div>
  </div>

<script>
  const field = document.getElementById('emberField');
  for(let i=0;i<14;i++){
    const e = document.createElement('div');
    e.className = 'ember';
    e.textContent = ['♥','✦','♥'][i % 3];
    e.style.left = Math.random() * 100 + '%';
    e.style.setProperty('--drift', (Math.random() * 60 - 30) + 'px');
    e.style.animationDuration = (7 + Math.random() * 6) + 's';
    e.style.animationDelay = (Math.random() * 8) + 's';
    e.style.fontSize = (10 + Math.random() * 10) + 'px';
    field.appendChild(e);
  }

  const lines = document.querySelectorAll('.slide-line');
  const lastLine = lines[lines.length - 1];
  const btn = document.getElementById('ctaBtn');
  lastLine.addEventListener('animationend', function(){
    btn.classList.add('visible');
  });
</script>
</body>
</html>
